<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BAL Asistan — Bornova Anadolu Lisesi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #ffffff;
      --page: #f9fafb;
      --surface: #ffffff;
      --surface-soft: #f3f4f6;
      --surface-hover: #e5e7eb;
      --border: #e5e7eb;
      --border-strong: #d1d5db;
      --text: #1f2937;
      --text-muted: #6b7280;
      --text-soft: #9ca3af;
      --brand: #0ea5e9;
      --brand-hover: #0284c7;
      --brand-light: #e0f2fe;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
      --radius: 12px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 6px rgba(0,0,0,.07);
      --shadow-lg: 0 10px 15px rgba(0,0,0,.1);
      --shadow-xl: 0 20px 25px rgba(0,0,0,.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      background: var(--page);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
    }

    button, input, textarea { font: inherit; }

    /* ── HEADER ────────────────────────────────────────────────────────────── */
    header {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: #ffffff;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .header-inner {
      width: min(1200px, 100%);
      margin: 0 auto;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      background: #f0f9ff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(6,182,212,.15);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 2px;
    }

    .header-text {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .header-text h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .header-text p {
      font-size: 0.75rem;
      color: var(--text-soft);
      margin-top: 1px;
    }

    #status-bar {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #d1d5db;
      flex-shrink: 0;
    }

    .status-dot.online {
      background: var(--success);
      box-shadow: 0 0 0 4px rgba(16,185,129,.15);
    }

    .status-dot.error {
      background: var(--error);
      box-shadow: 0 0 0 4px rgba(239,68,68,.15);
    }

    .status-dot.loading {
      background: var(--text-soft);
      animation: pulse 1.2s infinite;
    }

    /* ── QUOTA DISPLAY ─────────────────────────────────────────────────────── */
    #quota-display-fixed {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      background: #ffffff;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--brand);
      box-shadow: var(--shadow-md);
    }

    /* ── MAIN CONTAINER ────────────────────────────────────────────────────── */
    #chat-container {
      width: min(900px, 100%);
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 24px;
      margin: 0 auto;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0 18px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-track {
      background: transparent;
    }

    #messages::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    /* ── MESSAGES ──────────────────────────────────────────────────────────── */
    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp .2s ease both;
    }

    .msg-wrap.user {
      align-items: flex-end;
    }

    .msg-wrap.bot {
      align-items: flex-start;
    }

    .msg-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-muted);
      display: none;
    }

    .bubble {
      max-width: min(700px, 85%);
      font-size: 0.95rem;
      line-height: 1.6;
      font-weight: 400;
      overflow-wrap: anywhere;
    }

    .msg-wrap.user .bubble {
      background: var(--brand);
      color: #ffffff;
      border-radius: 18px;
      padding: 10px 16px;
      box-shadow: 0 2px 8px rgba(14,165,233,.2);
    }

    .msg-wrap.bot .bubble {
      color: var(--text);
      padding: 0 2px;
      background: transparent;
    }

    .bubble p {
      margin-bottom: 0.6em;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble strong {
      color: var(--text);
      font-weight: 600;
    }

    .bubble em {
      font-style: italic;
    }

    .bubble ul, .bubble ol {
      padding-left: 1.4em;
      margin: 0.5em 0;
    }

    .bubble li {
      margin-bottom: 0.4em;
    }

    .bubble a {
      color: var(--brand);
      text-decoration: none;
      font-weight: 500;
    }

    .bubble a:hover {
      text-decoration: underline;
    }

    .bubble code {
      background: var(--surface-soft);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'Courier New', monospace;
      color: #d97706;
    }

    .typing-indicator {
      display: flex;
      gap: 5px;
      padding: 8px 2px;
      width: fit-content;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #d1d5db;
      animation: bounce 1.2s infinite;
    }

    .typing-indicator span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-indicator span:nth-child(3) {
      animation-delay: 0.4s;
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      max-width: min(700px, 85%);
    }

    .source-chip {
      font-size: 0.7rem;
      padding: 4px 8px;
      background: #f0f9ff;
      border: 1px solid #bae6fd;
      border-radius: 999px;
      color: #0369a1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
      font-weight: 500;
    }

    /* ── WELCOME SCREEN ────────────────────────────────────────────────────── */
    .welcome {
      text-align: center;
      padding: clamp(60px, 15vh, 120px) 16px 40px;
      color: var(--text-muted);
      animation: fadeUp .25s ease both;
    }

    .welcome .icon {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      margin: 0 auto 24px;
      background: var(--brand-light);
      color: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      font-weight: 750;
      box-shadow: 0 4px 12px rgba(14,165,233,.15);
    }

    .welcome .icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 8px;
    }

    .welcome h2 {
      font-size: clamp(1.8rem, 4vw, 2.4rem);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 12px;
    }

    .welcome p {
      font-size: 0.95rem;
      max-width: 480px;
      margin: 0 auto 28px;
      line-height: 1.6;
      color: var(--text-muted);
    }

    .suggestion-chips {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      max-width: 680px;
      margin: 0 auto;
    }

    .chip {
      min-height: 48px;
      text-align: left;
      font-size: 0.9rem;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      transition: all .15s ease;
      line-height: 1.4;
      font-weight: 500;
    }

    .chip:hover {
      background: var(--brand-light);
      border-color: var(--brand);
      color: var(--brand);
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }

    /* ── INPUT AREA ────────────────────────────────────────────────────────── */
    #input-area {
      padding: 16px 0 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0), #ffffff 30%);
    }

    #notice-layer {
      width: 100%;
      min-height: 0;
      padding: 0 0 12px;
      pointer-events: auto;
    }

    .notice-pill {
      position: relative;
      width: fit-content;
      max-width: 100%;
      margin-left: 0;
      padding: 10px 14px 10px 16px;
      border: 1px solid #fef3c7;
      background: #fffbeb;
      color: #92400e;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(245,158,11,.12);
      font-size: 0.8rem;
      line-height: 1.4;
      animation: noticeIn .18s ease both;
    }

    .notice-close {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      border: 0;
      background: transparent;
      color: #92400e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      line-height: 1;
    }

    .notice-close:hover {
      opacity: 0.7;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      box-shadow: var(--shadow-lg);
      transition: border-color .15s, box-shadow .15s;
    }

    .input-wrap:focus-within {
      border-color: var(--brand);
      box-shadow: 0 10px 30px rgba(14,165,233,.15);
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      resize: none;
      min-height: 24px;
      max-height: 150px;
      line-height: 1.55;
      overflow-y: auto;
      font-weight: 500;
    }

    #user-input::placeholder {
      color: var(--text-soft);
    }

    #user-input::-webkit-scrollbar {
      width: 4px;
    }

    #user-input::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 2px;
    }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #clear-btn,
    #send-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s ease;
      font-size: 1rem;
    }

    #clear-btn {
      background: transparent;
      color: var(--text-muted);
    }

    #clear-btn:hover {
      background: var(--surface-soft);
      color: var(--text);
    }

    #send-btn {
      background: var(--brand);
      color: #ffffff;
      font-weight: 600;
    }

    #send-btn:hover:not(:disabled) {
      background: var(--brand-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(14,165,233,.3);
    }

    #send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .input-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding: 0 4px;
      color: var(--text-soft);
      font-size: 0.7rem;
    }

    #char-count {
      font-weight: 500;
    }

    /* ── ANIMATIONS ────────────────────────────────────────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: translateY(0);
      }
      40% {
        transform: translateY(-5px);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    @keyframes noticeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── RESPONSIVE ────────────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      .header-inner, #chat-container {
        padding-left: 16px;
        padding-right: 16px;
      }

      #status-text {
        display: none;
      }

      .suggestion-chips {
        grid-template-columns: 1fr;
      }

      .bubble {
        max-width: 95%;
      }

      .welcome h2 {
        font-size: 1.8rem;
      }

      #messages {
        gap: 18px;
        padding: 24px 0 12px;
      }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <img src="BAL_Logo.png" alt="BAL Logo" />
      </div>
      <div class="header-text">
        <h1>BAL Asistan</h1>
        <p>Bornova Anadolu Lisesi</p>
      </div>
      <div id="status-bar">
        <div class="status-dot loading" id="status-dot"></div>
        <span id="status-text">Bağlanıyor...</span>
      </div>
    </div>
  </header>

  <!-- QUOTA DISPLAY -->
  <div id="quota-display-fixed">+0/40 +0/5</div>

  <!-- CHAT CONTAINER -->
  <div id="chat-container">
    <div id="messages">
      <!-- WELCOME SCREEN -->
      <div class="welcome" id="welcome-msg">
        <div class="icon" id="welcome-icon">
          <img src="BAL_Logo.png" alt="BAL" />
        </div>
        <h2>Merhaba 👋</h2>
        <p>Bornova Anadolu Lisesi hakkında merak ettiğin her şeyi sorabilirsin. Ne sormak istersin?</p>
        <div class="suggestion-chips">
          <button class="chip" onclick="sendSuggestion(this)">🎓 LGS taban puanı?</button>
          <button class="chip" onclick="sendSuggestion(this)">🥛 Ayran Günü nedir?</button>
          <button class="chip" onclick="sendSuggestion(this)">🏢 Pansiyona kayıt?</button>
          <button class="chip" onclick="sendSuggestion(this)">🎁 BALEV bursu?</button>
          <button class="chip" onclick="sendSuggestion(this)">🚌 Okula nasıl giderim?</button>
          <button class="chip" onclick="sendSuggestion(this)">🏆 YKS başarıları?</button>
        </div>
      </div>
    </div>

    <!-- INPUT -->
    <div id="input-area">
      <div id="notice-layer" aria-live="polite"></div>
      <div class="input-wrap">
        <textarea
          id="user-input"
          placeholder="Bir soru sor..."
          rows="1"
          maxlength="500"
        ></textarea>
        <div class="input-actions">
          <button id="clear-btn" title="Sohbeti temizle" onclick="clearChat()">↻</button>
          <button id="send-btn" title="Gönder" onclick="sendMessage()">↑</button>
        </div>
      </div>
      <div class="input-footer">
        <span>Enter'e basarak gönder</span>
        <span id="char-count">0 / 500</span>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';
    const SESSION_ID = 'session_' + Math.random().toString(36).slice(2, 9);

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const charCount = document.getElementById('char-count');
    const welcomeMsg = document.getElementById('welcome-msg');
    const noticeLayer = document.getElementById('notice-layer');
    const quotaEl = document.getElementById('quota-display-fixed');

    let isStreaming = false;
    const notifiedFallbackModels = new Set();

    let quotaInfo = {
      daily_used: 0,
      minute_used: 0,
      daily_limit: 40,
      minute_limit: 5,
    };

    function updateQuotaDisplay() {
      const dailyRemaining = Math.max(quotaInfo.daily_limit - quotaInfo.daily_used, 0);
      const minuteRemaining = Math.max(quotaInfo.minute_limit - quotaInfo.minute_used, 0);
      quotaEl.innerHTML = `+${dailyRemaining}/${quotaInfo.daily_limit} +${minuteRemaining}/${quotaInfo.minute_limit}`;
    }

    function setQuotaFromStatus(data) {
      if (!data) return;
      quotaInfo.daily_used = Number.isFinite(data.daily_used) ? data.daily_used : 0;
      quotaInfo.minute_used = Number.isFinite(data.minute_used) ? data.minute_used : 0;
      quotaInfo.daily_limit = Number.isFinite(data.daily_limit) ? data.daily_limit : 40;
      quotaInfo.minute_limit = Number.isFinite(data.minute_limit) ? data.minute_limit : 5;
      updateQuotaDisplay();
    }

    updateQuotaDisplay();

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    function showLimitNotice() {
      if (!noticeLayer) return;
      noticeLayer.innerHTML = '';
      const pill = document.createElement('div');
      pill.className = 'notice-pill';
      pill.innerHTML = `
        <span>⚠️ Günlük soru hakkınız azalıyor (30 soruya yaklaştınız)</span>
        <button class="notice-close" type="button" onclick="this.parentElement.remove()">×</button>
      `;
      noticeLayer.appendChild(pill);
    }

    function showModelFallbackNotice(notice) {
      if (!noticeLayer) return;
      const targetModel = notice?.to_model || 'unknown';
      if (notifiedFallbackModels.has(targetModel)) return;
      notifiedFallbackModels.add(targetModel);

      const pill = document.createElement('div');
      pill.className = 'notice-pill';
      pill.innerHTML = `
        <span>ℹ️ Yoğunluk nedeniyle model değiştirildi</span>
        <button class="notice-close" type="button" onclick="this.parentElement.remove()">×</button>
      `;
      noticeLayer.appendChild(pill);
    }

    async function loadAuthStatus() {
      try {
        const data = await apiFetch('/auth/status', { method: 'GET', headers: {} });
        if (data.near_limit) showLimitNotice();
        setQuotaFromStatus(data);
      } catch {
        // devam et
      }
    }

    async function checkHealth() {
      try {
        const res = await fetch(`${API_BASE}/health`);
        const data = await res.json();
        if (data.status === 'ok') {
          setStatus('online', `Hazır · ${data.chunks} kaynak`);
        } else {
          const issues = [];
          if (!data.groq) issues.push('API key yok');
          if (!data.database) issues.push('Veritabanı bağlantısı yok');
          setStatus('error', issues.join(', ') || 'Bağlantı hatası');
        }
      } catch {
        setStatus('error', 'API\'ye bağlanılamadı');
      }
    }

    function setStatus(state, text) {
      statusDot.className = `status-dot ${state}`;
      statusText.textContent = text;
    }

    function appendMessage(role, text) {
      if (welcomeMsg) welcomeMsg.remove();

      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = formatText(text);

      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      scrollToBottom();
      return bubble;
    }

    function appendTypingIndicator() {
      if (welcomeMsg) welcomeMsg.remove();

      const wrap = document.createElement('div');
      wrap.className = 'msg-wrap bot';
      wrap.id = 'typing-wrap';

      const indicator = document.createElement('div');
      indicator.className = 'typing-indicator';
      indicator.innerHTML = '<span></span><span></span><span></span>';

      wrap.appendChild(indicator);
      messagesEl.appendChild(wrap);
      scrollToBottom();
      return wrap;
    }

    function formatText(text) {
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
        .replace(/^[-•]\s+(.+)$/gm, '• $1')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>')
        .replace(/^/, '<p>').replace(/$/, '</p>');
    }

    function stripReasoningText(text) {
      return text
        .replace(/<think\b[^>]*>[\s\S]*?<\/think>/gi, '')
        .replace(/<thinking\b[^>]*>[\s\S]*?<\/thinking>/gi, '')
        .replace(/<think\b[^>]*>[\s\S]*$/gi, '')
        .replace(/<thinking\b[^>]*>[\s\S]*$/gi, '')
        .trim();
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || isStreaming) return;

      isStreaming = true;
      sendBtn.disabled = true;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      charCount.textContent = '0 / 500';

      appendMessage('user', message);
      const typingWrap = appendTypingIndicator();

      try {
        const response = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, session_id: SESSION_ID }),
        });

        if (!response.ok) {
          const data = await response.json().catch(() => ({}));
          if (data.near_limit) showLimitNotice();
          throw new Error(data.error || `HTTP ${response.status}`);
        }

        typingWrap.remove();

        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap bot';
        wrap.style.animation = 'fadeUp .2s ease both';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = '<p></p>';

        wrap.appendChild(bubble);
        messagesEl.appendChild(wrap);

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let rawText = '';
        let sources = [];
        let sseBuffer = '';
        let sseHadError = false;

        const processSseLine = line => {
          if (!line.startsWith('data: ')) return;
          try {
            const data = JSON.parse(line.slice(6));

            if (data.token) {
              rawText += data.token;
              bubble.innerHTML = formatText(stripReasoningText(rawText));
              scrollToBottom();
            }

            if (data.error) {
              bubble.innerHTML = `<p style="color:#ef4444">❌ ${data.error}</p>`;
              sseHadError = true;
            }

            if (data.model_fallback) {
              showModelFallbackNotice(data.model_fallback);
            }

            if (data.done) {
              sources = data.sources || [];
              if (data.near_limit) showLimitNotice();
            }
          } catch { /* */ }
        };

        while (true) {
          const { done, value } = await reader.read();
          if (done) {
            sseBuffer += decoder.decode();
            break;
          }

          sseBuffer += decoder.decode(value, { stream: true });
          const lines = sseBuffer.split('\n');
          sseBuffer = lines.pop() || '';

          for (const line of lines) {
            processSseLine(line);
          }
        }
        if (sseBuffer.trim()) processSseLine(sseBuffer.trim());

        if (sources.length > 0) {
          const sourcesEl = document.createElement('div');
          sourcesEl.className = 'sources';
          sources.forEach(s => {
            const chip = document.createElement('div');
            chip.className = 'source-chip';
            const parts = s.breadcrumb.split(' > ');
            chip.textContent = parts[parts.length - 1] || s.breadcrumb;
            chip.title = `${s.breadcrumb}`;
            sourcesEl.appendChild(chip);
          });
          wrap.appendChild(sourcesEl);
        }

        if (!sseHadError) {
          await loadAuthStatus();
        }

      } catch (err) {
        typingWrap?.remove();
        appendMessage('bot', `⚠️ Hata: ${err.message}`);
      }

      isStreaming = false;
      sendBtn.disabled = false;
      inputEl.focus();
      scrollToBottom();
    }

    function sendSuggestion(el) {
      inputEl.value = el.textContent.replace(/^[😀-🿿]\s*/, '');
      sendMessage();
    }

    async function clearChat() {
      try {
        await fetch(`${API_BASE}/clear`, {
          method: 'POST',
          credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: SESSION_ID }),
        });
      } catch { /* */ }

      messagesEl.innerHTML = `
        <div class="welcome" id="welcome-msg" style="animation: fadeUp .3s ease both">
          <div class="icon">
            <img src="BAL_Logo.png" alt="BAL" />
          </div>
          <h2>Sohbet sıfırlandı 🔄</h2>
          <p>Yeni bir soru sorabilirsin</p>
        </div>`;
    }

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
      charCount.textContent = `${inputEl.value.length} / 500`;
    });

    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    checkHealth();
    loadAuthStatus();
    setInterval(checkHealth, 30000);
  </script>
</body>
</html>
