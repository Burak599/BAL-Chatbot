services:
  - type: web
    name: ai-chatbot-bal
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir web wsgi:app --bind 0.0.0.0:$PORT --workers 1 --threads 8 --timeout 180
    envVars:
      - key: LOCAL_HTTPS
        value: "false"
      - key: FORCE_HTTPS
        value: "true"
      - key: FLASK_SECRET_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ADMIN_EMAILS
        sync: false

