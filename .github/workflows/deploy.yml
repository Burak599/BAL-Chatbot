name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # Node.js 24 uyarı hatasını çözer
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git kimlik bilgilerini tanımla (Hata vermemesi için şart)
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Hugging Face reposunu 'hf' adıyla bir remote olarak ekle
          git remote add hf https://brk9999:$HF_TOKEN@huggingface.co/spaces/brk9999/bal-chatbot
          
          # --force kullanarak GitHub'daki kodu Hugging Face'in üzerine yaz (Senkronize et)
          git push --force hf main