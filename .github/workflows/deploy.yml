name: Sync to Hugging Face hub

on:
  push:
    branches: [main] # GitHub'daki ana branch adın master ise burayı master yap
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Hugging Face Hub CLI
        run: pip install huggingface_hub

      - name: Direct Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git kancalarını (hooks) tamamen baypas eden resmî Hugging Face API yöntemi
          python -c "
          from huggingface_hub import HfApi
          api = HfApi(token='${{ secrets.HF_TOKEN }}')
          
          print('Hugging Face API bağlantısı kuruldu. Yükleme başlıyor...')
          api.upload_folder(
              folder_path='.',
              repo_id='brk9999/bal-chatbot',
              repo_type='space',
              delete_with_prefix=True
          )
          print('Yükleme başarıyla tamamlandı!')
          "