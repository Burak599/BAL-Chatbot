name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git kimlik bilgilerini tanımla
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Hugging Face'in reddettiği binary dosyaları git indexinden geçici olarak temizle
          git rm --cached BAL_Logo.png || true
          git rm --cached web/BAL_Logo.png || true
          git rm --cached data/bal_faiss.index || true
          git rm --cached scripts/data/bal_faiss.index || true
          
          # Değişiklikleri kaydet (Commit etmezsek push eski haliyle gider)
          git commit -m "Remove binary files for HF sync" || true
          
          # Hugging Face reposunu remote olarak ekle
          git remote add hf https://brk9999:$HF_TOKEN@huggingface.co/spaces/brk9999/bal-chatbot
          
          # Kodu Hugging Face üzerine zorlayarak pushla
          git push --force hf main