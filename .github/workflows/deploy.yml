name: Sync to Hugging Face hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Git kimlik bilgilerini tanımla
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Git LFS kurulumunu sanal makinede yap ve sorunlu uzantıları LFS'e kaydet
          git lfs install
          git lfs track "*.png"
          git lfs track "*.index"
          
          # Değişiklikleri işle
          git add .gitattributes
          git commit -m "Track binary files with Git LFS for HF" || true
          
          # Hugging Face reposunu remote olarak ekle
          git remote add hf https://brk9999:$HF_TOKEN@huggingface.co/spaces/brk9999/bal-chatbot
          
          # Kodu LFS verileriyle birlikte Hugging Face'e zorlayarak pushla
          git push --force hf main